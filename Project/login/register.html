<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importing a beautiful Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card-container">
        <!-- Logo or Icon could go here -->
        <div class="header-section">
            <h2>Create Account</h2>
            <p>Please fill in the details to register.</p>
        </div>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label for="regEmail">Email address</label>
                <input type="email" id="regEmail" required placeholder="Enter your email" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" required placeholder="Enter a password" autocomplete="new-password">
            </div>
            
            <p id="regErrorMessage" class="error-message"></p>
            
            <button type="submit" class="primary-btn">Register</button>
        </form>

        <p class="toggle-link">Already have an account? <a href="index.html">Log in here</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
