<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pages</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importing a beautiful Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card-container">
        <!-- Logo or Icon could go here -->
        <div class="header-section">
            <h2>Welcome Back</h2>
            <p>Please enter your details to sign in.</p>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email address</label>
                <input type="email" id="email" required placeholder="Enter your email" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
            </div>
            
            <p id="errorMessage" class="error-message"></p>
            
            <button type="submit" class="primary-btn">Sign In</button>
        </form>

        <p class="toggle-link">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
